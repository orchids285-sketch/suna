worker_processes auto;
events { worker_connections 2048; }
http {
  resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
  map $http_upgrade $conn_upgrade { default upgrade; '' close; }
  server {
    listen 8080; server_name _;
    client_max_body_size 64m;
    proxy_read_timeout 86400s; proxy_send_timeout 86400s;

    location = /__wlbrand.js { root /usr/share/nginx/html; default_type application/javascript; add_header Cache-Control "no-store" always; }

    # Per-Clerk Supabase session minted by the FoundReach backend.
    location = /__fr-session {
      set $bk "foundrreach-app-production.up.railway.app";
      proxy_pass https://$bk/api/suna/user-session$is_args$args;
      proxy_ssl_server_name on; proxy_set_header Host $bk; add_header Cache-Control "no-store" always;
    }

    # Supabase auth (GoTrue) — supabase-js calls SUPABASE_URL/auth/v1/*.
    location /auth/v1/ {
      set $gt "suna-gotrue-production.up.railway.app";
      rewrite ^/auth/v1/(.*)$ /$1 break;
      proxy_pass https://$gt;
      proxy_ssl_server_name on; proxy_set_header Host $gt;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization,apikey,x-client-info" always;
        return 204;
      }
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
    }

    # Everything else → the Suna web (white-labelled).
    location / {
      set $fe "suna-web-production.up.railway.app";
      proxy_pass https://$fe;
      proxy_ssl_server_name on; proxy_set_header Host $fe; proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $conn_upgrade;
      proxy_set_header Accept-Encoding "";
      proxy_hide_header X-Frame-Options; proxy_hide_header Content-Security-Policy;
      proxy_hide_header Cache-Control; proxy_hide_header ETag; proxy_hide_header Last-Modified; proxy_hide_header Expires;
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      sub_filter_once off; sub_filter_types text/html;
      sub_filter '</head>' '<style>[class*="logo" i],[id*="logo" i],[class*="brand" i],a[href*="kortix"],a[href*="suna.so"],a[href*="discord"],[class*="powered" i],link[rel*="icon"]{display:none!important}</style><script src="/__wlbrand.js"></script></head>';
    }
  }
}
